# All tunables live here. Change thresholds in config, not in code.

alpaca:
  env: paper   # live is code-locked until every roadmap gate passes (see README)

universe:   # liquid megacaps + index ETFs, long-only v1
  - SPY
  - QQQ
  - AAPL
  - MSFT
  - NVDA
  - AMZN
  - META
  - GOOGL
  - TSLA
  - AMD
  - NFLX
  - AVGO
  - JPM
  - BAC
  - XOM
  - CVX
  - UNH
  - V
  - MA
  - COST

backtest:
  start: "2024-07-01"
  end: null            # null = yesterday
  timeframe: 5Min
  feed: sip            # free plan includes historical SIP; auto-falls back to iex

costs:
  slippage_cents: 1    # per share, per side (entries buy higher, exits sell lower)

risk:
  equity: 100000       # fixed per-trade sizing base (no compounding in backtest)
  risk_pct: 0.5        # % of equity risked per trade via stop distance
  max_position_pct: 20 # position value cap
  flat_by_et: "15:50"  # everything closed by here, never hold overnight

strategies:
  orb:
    open_bars: 3       # first 15 minutes
    cutoff_et: "11:30"
    rr: 2.0
    max_risk_frac: 0.02
  vwap_revert:
    z_entry: 1.5
    stop_sigmas: 1.0
    sigma_window: 12
    start_et: "10:00"
    end_et: "15:00"
  momentum:
    confirm_bar: 12    # 10:30 ET on 5-min bars
    rr: 2.0
    stop_lookback: 6
    max_risk_frac: 0.015

gate:   # a strategy must clear ALL of these (on VALIDATION) for Phase 2 eligibility
  min_trades: 100
  min_expectancy_r: 0.05
  min_profit_factor: 1.15
  min_quarters_positive_frac: 0.6

research:   # Phase 1.5 disciplined sweep - grids PRE-DECLARED, gate applies to validation only
  train_start: "2024-07-01"
  train_end: "2025-12-31"
  val_start: "2026-01-01"
  val_end: null            # null = yesterday
  min_train_trades: 150
  min_train_expectancy_r: 0.02   # winner below this on TRAIN -> labeled WEAK PASS
  slippage_sensitivity_cents: [0.5, 2.0]
  # market-context params for the opt-in regime/relative-strength filters
  regime_open_bars: 3
  regime_cutoff_et: "10:30"
  # walk-forward: the winner must be positive across MOST sequential folds of the
  # validation window - not just the pooled slice. Single biggest overfit defense.
  walkforward:
    folds: 4
    min_positive_frac: 0.6
  grids:
    orb:   # focused: fixed the picked-over params, sweep the NEW hypotheses (filters)
      side: [long]
      open_bars: [3]
      rr: [1.5, 2.0]
      cutoff_et: ["10:30"]
      vol_confirm: [false]
      min_or_width_frac: [null, 0.004]   # volatility floor: skip dead-tape days
      regime_filter: [false, true]       # only go long when SPY is breaking up
      rs_topk: [null, 5]                 # only trade the K strongest names vs SPY
    vwap_revert:
      side: [long, short]
      z_entry: [1.5, 2.0, 2.5]
      stop_sigmas: [1.0, 1.5]
      chop_filter: [false, true]
      time_stop_bars: [12, 24]
    momentum:
      side: [long, short]
      rr: [2.0, 3.0]
      stop_lookback: [6, 12]
      hold_above: [3, 6]
      time_stop_bars: [24, 36]

live:   # Phase 2 paper deployment - ORB LOGGING BENCHMARK (gate=FAIL; measured live, NOT a validated edge)
  strategy: orb
  feed: iex            # free real-time feed for the intraday loop
  poll_seconds: 120
  session_start_et: "09:35"
  max_positions: 3
  params:
    open_bars: 3
    cutoff_et: "10:30"
    rr: 1.5
    vol_confirm: false
    max_risk_frac: 0.02
  premarket:
    enabled: true
    guard_mode: log_only        # log_only | enforce - stays log_only until evidence supports enforcing
    halt_spy_gap_pct: 1.5       # would-halt if SPY gaps more than this overnight
    skip_symbol_gap_pct: 4.0    # would-skip symbols gapping more than this (earnings/news days)
    llm_model: claude-haiku-4-5-20251001   # used only if ANTHROPIC_API_KEY secret is set

arming:   # kill-switch: does the entry session place trades at all?
  # manual = trade regardless of verdict (preserves the pre-registered THE MONTH
  #          measurement of the ORB logging-benchmark, even though its gate = FAIL).
  # auto   = obey data/arming.json written by research: only trade when a config
  #          actually cleared the gate + walk-forward. Flip to "auto" AFTER THE
  #          MONTH completes, so a genuine no-edge strategy cannot keep trading.
  mode: manual
  divergence:            # day-level live-vs-expected monitor (alerts; disarms in auto)
    enabled: true
    baseline_expectancy_r: 0.0   # honest prior for the benchmark: ~zero edge
    min_sessions: 10             # need this many logged days before judging
    max_drawdown_pct: 6.0        # alert if live paper drawdown exceeds this
