name: trade

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "entry-session or eod-flatten"
        required: false
        default: "entry-session"
  schedule:
    - cron: "35 13 * * 1-5"   # 09:35 ET in summer (EDT) - entry session
    - cron: "35 14 * * 1-5"   # 09:35 ET in winter (EST) - entry session
    - cron: "45 19 * * 1-5"   # 15:45 ET in summer - EOD flatten + recap
    - cron: "45 20 * * 1-5"   # 15:45 ET in winter - EOD flatten + recap

permissions:
  contents: write

concurrency:
  group: trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Integrity check (guards against corrupted files)
        run: python -m compileall -q src tests

      - name: Decide mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            H=$(date -u +%H)
            if [ "$H" -ge 19 ]; then MODE="eod-flatten"; else MODE="entry-session"; fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "running mode: $MODE"

      - name: Run trader
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.live.trader --${{ steps.mode.outputs.mode }}

      - name: Commit daily log
        run: |
          git config user.name "stock-trader-bot"
          git config user.email "stock-trader-bot@users.noreply.github.com"
          git add data/ reports/
          git diff --cached --quiet || git commit -m "paper log $(date -u +%Y%m%dT%H%M%SZ)"
          git pull --rebase origin main || true
          git push
