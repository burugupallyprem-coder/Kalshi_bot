name: trade

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "entry-session or eod-flatten"
        required: false
        default: "entry-session"
  schedule:
    - cron: "17 13 * * 1-5"   # fires ~09:17 ET summer - code waits for 09:35 (scheduler-proof)
    - cron: "17 14 * * 1-5"   # backup tick / winter early tick - waits or no-ops
    - cron: "17 19 * * 1-5"   # fires ~15:17 ET summer - code waits for 15:45 flatten
    - cron: "17 20 * * 1-5"   # backup tick / winter - waits or dedupes

permissions:
  contents: write

concurrency:
  group: trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Integrity check (guards against corrupted files)
        run: python -m compileall -q src tests

      - name: Decide mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            H=$(date -u +%H)
            if [ "$H" -ge 19 ]; then MODE="eod-flatten"; else MODE="entry-session"; fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "running mode: $MODE"

      - name: Run trader
        id: mainrun
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.live.trader --${{ steps.mode.outputs.mode }}

      - name: Render dashboard
        if: always()
        env:
          WORKFLOW_NAME: trade-${{ steps.mode.outputs.mode == 'eod-flatten' && 'eod' || 'entry' }}
          RUN_OUTCOME: ${{ steps.mainrun.outcome }}
        run: python -m src.live.dashboard

      - name: Commit daily log
        if: always()
        run: |
          git config user.name "stock-trader-bot"
          git config user.email "stock-trader-bot@users.noreply.github.com"
          git add data/ reports/ dashboard.html
          git diff --cached --quiet || git commit -m "paper log $(date -u +%Y%m%dT%H%M%SZ)"
          git pull --rebase origin main || true
          git push
