name: trade

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "entry-session or eod-flatten"
        required: false
        default: "entry-session"
  schedule:
    # ENTRY ticks - staggered hours early; code waits until 09:35 ET, extras no-op past cutoff
    - cron: "30 9 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "37 10 * * 1-5"
    - cron: "37 11 * * 1-5"
    - cron: "37 12 * * 1-5"
    - cron: "5 13 * * 1-5"
    - cron: "19 13 * * 1-5"
    # EOD ticks - DENSE and staggered so at least one survives GitHub's dropped
    # crons and lands in the 15:30-15:50 ET flatten window; code waits until
    # 15:45 ET, dedupe stops doubles. Late/post-close ticks now record + warn
    # (see run_eod_flatten) instead of silently skipping.
    - cron: "37 17 * * 1-5"
    - cron: "37 18 * * 1-5"
    - cron: "7 19 * * 1-5"
    - cron: "22 19 * * 1-5"
    - cron: "37 19 * * 1-5"
    - cron: "50 19 * * 1-5"
    - cron: "17 20 * * 1-5"

permissions:
  contents: write

concurrency:
  group: trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Integrity check (guards against corrupted files)
        run: python -m compileall -q src tests

      - name: Decide mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            H=$(date -u +%H)
            if [ "$H" -ge 17 ]; then MODE="eod-flatten"; else MODE="entry-session"; fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "running mode: $MODE"

      - name: Run trader
        id: mainrun
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.live.trader --${{ steps.mode.outputs.mode }}

      - name: Render dashboard
        if: always()
        env:
          WORKFLOW_NAME: trade-${{ steps.mode.outputs.mode == 'eod-flatten' && 'eod' || 'entry' }}
          RUN_OUTCOME: ${{ steps.mainrun.outcome }}
        run: python -m src.live.dashboard

      - name: Commit daily log
        if: always()
        run: |
          git config user.name "stock-trader-bot"
          git config user.email "stock-trader-bot@users.noreply.github.com"
          for i in 1 2 3; do
            git fetch origin main
            git reset --soft origin/main
            git add data/ reports/ dashboard.html
            if git diff --cached --quiet; then echo "nothing to commit"; break; fi
            git commit -m "paper log $(date -u +%Y%m%dT%H%M%SZ)"
            if git push origin HEAD:main; then break; fi
            echo "push race - retry $i"
            sleep $((RANDOM % 10 + 5))
          done
