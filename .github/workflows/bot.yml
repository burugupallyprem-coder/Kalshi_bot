name: bot

on:
  schedule:
    - cron: "0 13 * * 1-5"   # weekdays 13:00 UTC (9:00 ET summer / 8:00 ET winter) pre-market heartbeat
  workflow_dispatch:
    inputs:
      mode:
        description: "heartbeat or status"
        required: false
        default: "heartbeat"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.main --${{ github.event.inputs.mode || 'heartbeat' }}
