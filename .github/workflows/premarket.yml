name: premarket

on:
  workflow_dispatch:
    inputs:
      force:
        description: "run outside the pre-open window (true/false)"
        required: false
        default: "false"
  schedule:
    # staggered early ticks - code waits until ~60min before open; dedupe stops doubles
    - cron: "53 9 * * 1-5"
    - cron: "53 10 * * 1-5"
    - cron: "53 11 * * 1-5"
    - cron: "23 12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: premarket
  cancel-in-progress: false

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Integrity check (guards against corrupted files)
        run: python -m compileall -q src tests

      - name: Run pre-market briefing
        id: mainrun
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -m src.live.premarket --force
          else
            python -m src.live.premarket
          fi

      - name: Render dashboard
        if: always()
        env:
          WORKFLOW_NAME: premarket
          RUN_OUTCOME: ${{ steps.mainrun.outcome }}
        run: python -m src.live.dashboard

      - name: Commit flags
        if: always()
        run: |
          git config user.name "stock-trader-bot"
          git config user.email "stock-trader-bot@users.noreply.github.com"
          for i in 1 2 3; do
            git fetch origin main
            git reset --soft origin/main
            git add data/ dashboard.html
            if git diff --cached --quiet; then echo "nothing to commit"; break; fi
            git commit -m "premarket flags $(date -u +%Y%m%dT%H%M%SZ)"
            if git push origin HEAD:main; then break; fi
            echo "push race - retry $i"
            sleep $((RANDOM % 10 + 5))
          done
