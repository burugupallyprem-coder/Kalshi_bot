name: research

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 6"   # Saturdays 13:00 UTC - weekly research cycle

permissions:
  contents: write

concurrency:
  group: research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Integrity check (guards against corrupted files)
        run: python -m compileall -q src tests


      - name: Run research sweep
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -m src.backtest.research

      - name: Commit reports
        run: |
          git config user.name "stock-trader-bot"
          git config user.email "stock-trader-bot@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "research repor